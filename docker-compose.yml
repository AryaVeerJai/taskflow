version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow
    networks:
      - taskflow-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_32chars}
      JWT_EXPIRE: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_in_production}
      JWT_REFRESH_EXPIRE: 30d
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskflow-net
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api/v1
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - taskflow-net

volumes:
  mongo_data:

networks:
  taskflow-net:
    driver: bridge
