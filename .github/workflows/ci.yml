name: CI — TaskFlow

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check module integrity
        run: node -e "require('./src/app'); console.log('App loads OK');"
        env:
          NODE_ENV: test
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/taskflow_test
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          JWT_EXPIRE: 7d
          JWT_REFRESH_SECRET: test_refresh_secret_key_minimum_32_characters
          JWT_REFRESH_EXPIRE: 30d
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          PORT: 5001
          MONGO_URI: mongodb://localhost:27017/taskflow_test
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          JWT_EXPIRE: 7d
          JWT_REFRESH_SECRET: test_refresh_secret_key_minimum_32_characters
          JWT_REFRESH_EXPIRE: 30d
          ALLOWED_ORIGINS: http://localhost:3000

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:5000/api/v1
          CI: false   # treat warnings as warnings, not errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ── Docker ───────────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: taskflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: taskflow-frontend:latest
          build-args: |
            REACT_APP_API_URL=http://localhost:5000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
